services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "9001:5001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ALPACA_PAPER_API_KEY=${ALPACA_PAPER_API_KEY}
      - ALPACA_PAPER_SECRET_KEY=${ALPACA_PAPER_SECRET_KEY}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - EODHD_API_KEY=${EODHD_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - POSTMARK_API_KEY=${POSTMARK_API_KEY:-}
      - TO_EMAIL=${TO_EMAIL:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Merged single FastHTML app (landing + auth + chat + guide + voice).
  # Serves BOTH alpatrade.chat and alpatrade.dev via `python main.py` on port 5003.
  # (The legacy `web` service running web_app.py has been retired.)
  agui:
    build:
      context: .
      dockerfile: Dockerfile.agui
    ports:
      - "9003:5003"
    environment:
      - ASSETHERO_WEB_PORT=5003
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=https://api.alpatrade.chat
      - ALPACA_PAPER_API_KEY=${ALPACA_PAPER_API_KEY}
      - ALPACA_PAPER_SECRET_KEY=${ALPACA_PAPER_SECRET_KEY}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - EODHD_API_KEY=${EODHD_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5003/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Autonomous agent-team worker (Phase C). Paper-only, opt-in: only starts with
  # `docker compose --profile autonomy up`, so the prod deploy never runs it. Enable
  # the loop itself with AUTONOMY_ENABLED=true.
  autonomy:
    build:
      context: .
      dockerfile: Dockerfile.agui
    command: ["python", "-m", "engine.autonomy.worker"]
    profiles: ["autonomy"]
    environment:
      - AUTONOMY_ENABLED=${AUTONOMY_ENABLED:-false}
      - AUTONOMY_SCAN_SECONDS=${AUTONOMY_SCAN_SECONDS:-300}
      - AUTONOMY_STRATEGY=${AUTONOMY_STRATEGY:-btd}
      - DATABASE_URL=${DATABASE_URL}
      - ALPACA_PAPER_API_KEY=${ALPACA_PAPER_API_KEY}
      - ALPACA_PAPER_SECRET_KEY=${ALPACA_PAPER_SECRET_KEY}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - MODEL_PROVIDER=${MODEL_PROVIDER:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - POSTMARK_API_KEY=${POSTMARK_API_KEY:-}
      - TO_EMAIL=${TO_EMAIL:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
